<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="590" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc">
  <title id="title">PawBench v1.0 overall leaderboard</title>
  <desc id="desc">Overall leaderboard matrix for 9 models, 3 harnesses, and 150 PawBench tasks.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.2; }
      .tab { fill: #f8fafc; stroke: #e5e7eb; stroke-width: 1; }
      .tab-active { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 1; }
      .title { fill: #111827; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #64748b; font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #334155; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #94a3b8; font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .model { fill: #334155; font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .score { fill: #ffffff; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .avg-score { fill: #ffffff; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .delta { fill: #334155; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #0f766e; font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .grid { stroke: #eef2f7; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="590" rx="18"/>

  <g transform="translate(24 22)">
