    <text class="small" x="155" y="23">124</text>
    <rect class="tab" x="193" y="0" width="115" height="36" rx="7"/>
    <text class="subtitle" x="210" y="23">Multimodal</text>
    <text class="small" x="280" y="23">26</text>
  </g>

